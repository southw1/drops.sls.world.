<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faction Drops</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>YBN Faction Drops</h1>

<div class="tiers">
    <button class="tier-btn active" data-tier="t0">Tier 0</button>
    <button class="tier-btn active" data-tier="t1">Tier 1</button>
    <button class="tier-btn active" data-tier="t2">Tier 2</button>
    <button class="tier-btn active" data-tier="t3">Tier 3</button>
    <button class="tier-btn active" data-tier="t4">Tier 4</button>
</div>

<div class="spin-container">
    <div class="track" id="track"></div>
    <div class="selector"></div>
</div>

<button id="spinBtn">SPIN</button>

<div id="result"></div>

<div class="info-panels">
    <div class="panel">
        <h3>📦 Current Pool</h3>
        <div id="poolList"></div>
    </div>

    <div class="panel">
        <h3>📜 History</h3>
        <div id="historyList"></div>
    </div>
</div>

<div class="bottom-result" id="bottomResult">
    🎯 Ready to spin...
</div>

<script src="script.js"></script>
</body>
</html>
