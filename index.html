<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drop Spinner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎯 Drop Spinner</h1>

<div class="controls">
    <button class="tier active" data-tier="t1">T1</button>
    <button class="tier active" data-tier="t2">T2</button>
    <button class="tier active" data-tier="t3">T3</button>
</div>

<div class="spinner">
    <div class="track" id="track"></div>
    <div class="pointer"></div>
</div>

<button id="spin">SPIN</button>

<div id="result"></div>

<script src="script.js"></script>
</body>
</html>
